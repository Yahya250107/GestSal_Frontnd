<div class="container">
  <div class="header-row">
    <h2>Gestion des Employés</h2>
    <button class="btn-apply" (click)="generateBaseSalaryReportPDF()">Liste Salaires PDF</button>
  </div>

  <div class="form-card">
    <h3>Ajouter un employé</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" [(ngModel)]="newEmploye.nom" placeholder="Nom">
      </div>
      <div class="form-group">
        <label>Prénom</label>
        <input type="text" [(ngModel)]="newEmploye.prenom" placeholder="Prénom">
      </div>
      <div class="form-group">
        <label>Salaire de base</label>
        <input type="number" [(ngModel)]="newEmploye.salaireBase">
      </div>
      <div class="form-group">
        <label>Poste</label>
        <input type="text" [(ngModel)]="newEmploye.postetitre" placeholder="Ex: Ingénieur">
      </div>
    </div>
    <button class="btn-apply" (click)="addEmploye()">Ajouter</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Prénom</th>
        <th>Poste</th>
        <th>Salaire de base</th>
        <th>Statut</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let e of employes" [class.inactive]="!e.actif">
        <td>{{ e.idEmp }}</td>
        <td>{{ e.nom }}</td>
        <td>{{ e.prenom }}</td>
        <td>{{ getPosteTitle(e.idPoste) }}</td>
        <td>
          <span *ngIf="editingId !== e.idEmp">{{ e.salaireBase }} MAD</span>
          <input *ngIf="editingId === e.idEmp" type="number" [(ngModel)]="editSalaire">
        </td>
        <td>
          <span class="badge-actif" *ngIf="e.actif">Actif</span>
          <span class="badge-inactif" *ngIf="!e.actif">Inactif</span>
        </td>
        <td class="actions">
          <button *ngIf="editingId !== e.idEmp && e.actif" class="btn-edit" (click)="startEdit(e)">Modifier</button>
          <button *ngIf="editingId === e.idEmp" class="btn-apply" (click)="saveEdit(e)">Sauvegarder</button>
          <button *ngIf="editingId === e.idEmp" class="btn-cancel" (click)="cancelEdit()">Annuler</button>
          <button *ngIf="e.actif" class="btn-warning" (click)="desactiver(e.idEmp)">Désactiver</button>
          <button *ngIf="!e.actif" class="btn-edit" (click)="reactiver(e.idEmp)">Réactiver</button>
          <button class="btn-delete" (click)="deleteEmploye(e.idEmp)">Supprimer</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
