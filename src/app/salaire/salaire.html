<div class="container">
  <h2>Gestion des Salaires</h2>

  <div class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>Employé</label>
        <select [(ngModel)]="form.idEmp">
          <option *ngFor="let e of employes" [value]="e.idEmp">
            {{ e.prenom }} {{ e.nom }}
          </option>
        </select>
      </div>
      <div class="form-group">
        <label>Mois</label>
        <input type="number" [(ngModel)]="form.mois" min="1" max="12">
      </div>
      <div class="form-group">
        <label>Année</label>
        <input type="number" [(ngModel)]="form.annee">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>H. sup soir normal</label>
        <input type="number" [(ngModel)]="form.heuresSupNormalSoir" step="0.5">
      </div>
      <div class="form-group">
        <label>H. sup nuit normal</label>
        <input type="number" [(ngModel)]="form.heuresSupNormalNuit" step="0.5">
      </div>
      <div class="form-group">
        <label>H. sup soir férié</label>
        <input type="number" [(ngModel)]="form.heuresSupFerieSoir" step="0.5">
      </div>
      <div class="form-group">
        <label>H. sup nuit férié</label>
        <input type="number" [(ngModel)]="form.heuresSupFerieNuit" step="0.5">
      </div>
      <div class="form-group">
        <label>Heures absence</label>
        <input type="number" [(ngModel)]="form.heuresAbsence" step="0.5">
      </div>
    </div>

    <button class="btn-apply" (click)="applyPayroll()">Apply Payroll</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Employé</th>
        <th>Mois</th>
        <th>Année</th>
        <th>Salaire calculé</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of salaires">
        <td>{{ getName(s.idEmp) }}</td>
        <td>{{ s.mois }}</td>
        <td>{{ s.annee }}</td>
        <td class="salary-amount">{{ s.sf }} MAD</td>
      </tr>
    </tbody>
  </table>
</div>
