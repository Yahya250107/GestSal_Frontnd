<div class="home">
  <div class="hero">
    <h1>Bienvenue sur GestSal</h1>
    <p>Gérez les salaires de vos employés simplement et efficacement.</p>
    <a routerLink="/salaires" class="btn-start">Gérer les salaires</a>
  </div>

  <div class="log-card">
    <h3>Activité récente</h3>
    <div *ngIf="logService.logs.length === 0" class="log-empty">Aucune activité pour le moment.</div>
    <div *ngFor="let log of logService.logs" class="log-item">
      <span class="log-msg">{{ log.message }}</span>
      <span class="log-time">{{ log.time | date:'HH:mm:ss' }}</span>
    </div>
  </div>
</div>
